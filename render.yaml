services:
  - type: web
    name: ducpt-9router-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /healthz
    disk:
      name: ducpt-9router-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ROUTER_IMAGE_ENDPOINT
        sync: false
      - key: ROUTER_API_KEY
        sync: false
      - key: SHEETS_WEBHOOK_URL
        sync: false
