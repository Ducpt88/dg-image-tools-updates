services:
  - type: web
    name: ducpt-9router-api
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run server
    healthCheckPath: /healthz
    disk:
      name: ducpt-9router-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOW_LOCAL_ADMIN
        value: "false"
      - key: ROUTER_IMAGE_ENDPOINT
        sync: false
      - key: ROUTER_API_KEY
        sync: false
      - key: ROUTER_PROVIDER
        value: openai
      - key: ROUTER_IMAGE_MODEL
        value: gpt-image-1
      - key: SHEETS_WEBHOOK_URL
        sync: false
      - key: SECURITY_ALERT_WEBHOOK_URL
        sync: false
      - key: ADMIN_ALERT_EMAIL
        value: hoangvant77internet@gmail.com
      - key: SALES_SHEET_ID
        value: 1YL2mY6uYJCNrLASNjev7g7XDiPYVi4wBy8S_V7Ntlzg
      - key: BANK_ACCOUNT_NO
        value: PSP2610910700000069
      - key: BANK_ACCOUNT_NAME
        value: Hoang Van Duc
      - key: SEPAY_BANK_CODE
        value: VPBank
      - key: SITE_IMAGE_URL
        value: https://ducpt.com/image
